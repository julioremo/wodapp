<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raw Lab Journal 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500&family=DM+Mono:wght@400;500&family=Permanent+Marker&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['DM Sans', 'sans-serif'],
                        mono: ['DM Mono', 'monospace'],
                        marker: ['Permanent Marker', 'cursive'],
                    },
                    colors: {
                        paper: '#FDFBF7',
                        ink: '#1F2937',
                        markerRed: '#C25E48',
                        markerBlue: '#06AED5',
                        markerGreen: '#5DA271',
                    }
                }
            }
        }
    </script>
    <style>
        /* Making lines look slightly organic/imperfect */
        .sketch-line {
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        
        /* The "Scribble" effect for crossing out text */
        .strike-through {
            position: relative;
            color: #9CA3AF;
        }
        .strike-through::after {
            content: '';
            position: absolute;
            left: -2%;
            top: 50%;
            width: 104%;
            height: 2px;
            background: #1F2937;
            transform: rotate(-1deg);
            opacity: 0.8;
        }
    </style>
</head>
<body class="bg-paper text-ink font-sans antialiased p-8 min-h-screen flex flex-col items-center justify-center space-y-12">

    <div class="w-full max-w-md relative">
        <div class="absolute inset-0 border-2 border-ink bg-white opacity-50 translate-x-1 translate-y-1 pointer-events-none"></div>
        
        <div class="relative bg-paper border-2 border-ink p-6 z-10">
            <div class="flex justify-between items-start mb-6 border-b-2 border-ink pb-4 border-dashed">
                <div>
                    <h2 class="font-mono text-sm uppercase tracking-widest text-stone-500 mb-1">Subject: Daily Enhancement</h2>
                    <h1 class="text-3xl font-normal tracking-tight">Heavy Squats</h1>
                </div>
                <div class="border-2 border-markerRed text-markerRed px-2 py-1 transform rotate-6">
                    <span class="font-mono text-xs font-bold uppercase">In Progress</span>
                </div>
            </div>

            <div class="space-y-4 font-mono text-sm">
                
                <div class="flex items-center gap-4 group cursor-pointer">
                    <div class="w-6 h-6 border-2 border-ink flex items-center justify-center bg-ink">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#FDFBF7" stroke-width="3" stroke-linecap="round">
                            <path d="M18 6L6 18M6 6l12 12"></path>
                        </svg>
                    </div>
                    <div class="strike-through">
                        <span>Warm-up: 500m Row</span>
                    </div>
                </div>

                <div class="flex items-center gap-4 group cursor-pointer">
                    <div class="w-6 h-6 border-2 border-ink hover:bg-stone-100"></div>
                    <div>
                        <span class="font-bold">Set 1:</span> 5 Reps @ 100kg
                    </div>
                </div>

                <div class="relative mt-6 pt-4 border-t border-ink">
                    <div class="flex justify-between items-center">
                        <span class="text-stone-500 uppercase text-xs">Target Load</span>
                        <span class="font-mono text-2xl">125 KG</span>
                    </div>
                    
                    <div class="absolute top-2 right-[-10px] w-24 h-12 pointer-events-none">
                         <svg viewBox="0 0 100 60" fill="none">
                            <path d="M10,25 C15,5 80,0 90,20 C100,45 20,55 10,35 C5,20 60,15 80,30" 
                                  stroke="#C25E48" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9"/>
                        </svg>
                        <span class="absolute -top-3 -right-2 text-markerRed font-marker text-xs transform rotate-12 bg-paper px-1">PR!!</span>
                    </div>
                </div>

            </div>

            <button class="w-full mt-8 border-2 border-ink py-4 hover:bg-ink hover:text-white transition-all active:translate-y-1 font-mono uppercase tracking-widest text-sm font-bold flex justify-center items-center gap-2">
                <span class="w-3 h-3 bg-markerRed rounded-full"></span>
                Mark Complete
            </button>
        </div>
    </div>


    <div class="w-full max-w-md">
        <h3 class="font-mono text-xs uppercase tracking-widest mb-2 ml-1 text-stone-500">Figure 1.2: Recovery Trends</h3>
        
        <div class="border-l-2 border-b-2 border-ink p-4 relative h-64 bg-transparent">
            <div class="absolute inset-0" style="background-image: radial-gradient(#E5E7EB 1px, transparent 1px); background-size: 20px 20px; opacity: 0.5; z-index: -1;"></div>

            <svg viewBox="0 0 300 150" class="w-full h-full overflow-visible">
                
                <polyline 
                    points="10,120 50,110 90,130 130,80 170,90 210,40 250,50 290,20" 
                    fill="none" 
                    stroke="#1F2937" 
                    stroke-width="1.5" 
                    class="sketch-line"
                />

                <circle cx="10" cy="120" r="2" fill="#1F2937" />
                <circle cx="50" cy="110" r="2" fill="#1F2937" />
                <circle cx="90" cy="130" r="2" fill="#1F2937" />
                <circle cx="130" cy="80" r="2" fill="#1F2937" />
                <circle cx="170" cy="90" r="2" fill="#1F2937" />
                
                <circle cx="210" cy="40" r="3" fill="#C25E48" />
                <circle cx="210" cy="40" r="8" stroke="#C25E48" stroke-width="1.5" fill="none" opacity="0.6" stroke-dasharray="2 2"/>
                
                <line x1="210" y1="40" x2="230" y2="10" stroke="#1F2937" stroke-width="0.5" />
                <text x="235" y="10" font-family="monospace" font-size="8" fill="#1F2937">New threshold</text>

                <path d="M190,0 L230,0 L230,150 L190,150 Z" fill="#06AED5" opacity="0.1" />

            </svg>
        </div>
        
        <div class="flex justify-between text-[10px] font-mono mt-2 text-stone-500 px-2">
            <span>MON</span>
            <span>TUE</span>
            <span>WED</span>
            <span>THU</span>
            <span>FRI</span>
            <span>SAT</span>
            <span>SUN</span>
        </div>
    </div>

</body>
</html>
